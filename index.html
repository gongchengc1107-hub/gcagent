<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: http://127.0.0.1:* ws://127.0.0.1:* http://localhost:* ws://localhost:*;"
    />
    <title>Codemaker Dashboard</title>
    <!-- 主题初始化：在 CSS 加载前设置，防止白屏闪烁 -->
    <script>
      ;(function () {
        var theme = 'light'
        try {
          var stored = localStorage.getItem('codemaker-settings')
          if (stored) {
            var parsed = JSON.parse(stored)
            if (parsed && parsed.state && parsed.state.theme) {
              theme = parsed.state.theme
            }
          }
        } catch (e) {
          /* ignore */
        }
        document.documentElement.setAttribute('data-theme', theme)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
