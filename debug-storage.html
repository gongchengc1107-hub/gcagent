<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Debug Storage</title>
<style>
body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
pre { background: #2d2d2d; padding: 16px; border-radius: 8px; overflow-x: auto; }
button { background: #0078d4; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin: 4px; }
button:hover { background: #1a8ae8; }
</style>
</head>
<body>
<h2>LocalStorage 调试工具</h2>
<button onclick="showSettings()">显示 codemaker-settings</button>
<button onclick="showChat()">显示 codemaker-chat</button>
<button onclick="showAll()">显示所有 keys</button>
<button onclick="clearAll()">清空所有数据</button>
<pre id="output">点击按钮查看数据...</pre>

<script>
function showSettings() {
  const raw = localStorage.getItem('codemaker-settings');
  if (!raw) {
    document.getElementById('output').textContent = '⚠️ codemaker-settings 不存在';
    return;
  }
  try {
    const s = JSON.parse(raw);
    document.getElementById('output').textContent = JSON.stringify(s, null, 2);
  } catch(e) {
    document.getElementById('output').textContent = '解析失败: ' + e.message;
  }
}

function showChat() {
  const raw = localStorage.getItem('codemaker-chat');
  if (!raw) {
    document.getElementById('output').textContent = '⚠️ codemaker-chat 不存在';
    return;
  }
  try {
    const s = JSON.parse(raw);
    // 只显示最后一条 assistant 消息
    const sessionId = Object.keys(s.messages || {})[0];
    const msgs = sessionId ? (s.messages[sessionId] || []) : [];
    const lastAssistant = msgs.filter(m => m.role === 'assistant').pop();
    const result = {
      sessionId,
      totalMessages: msgs.length,
      lastAssistantReply: lastAssistant ? {
        content: lastAssistant.content,
        hasOptions: lastAssistant.content.includes('<!--options')
      } : null
    };
    document.getElementById('output').textContent = JSON.stringify(result, null, 2);
  } catch(e) {
    document.getElementById('output').textContent = '解析失败: ' + e.message;
  }
}

function showAll() {
  const keys = Object.keys(localStorage);
  document.getElementById('output').textContent = 'Keys: ' + keys.join('\n');
}

function clearAll() {
  if (confirm('确定要清空所有数据吗？')) {
    localStorage.clear();
    document.getElementById('output').textContent = '✅ 已清空';
  }
}
</script>
</body>
</html>
